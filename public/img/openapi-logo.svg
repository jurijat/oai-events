<svg width="248" height="56" viewBox="0 0 248 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stylized circular icon: 4 chunky filled bean segments forming a ring -->
  <g fill="#15191C">
    <!-- Top segment (≈ -125° to -55°) -->
    <path d="M 15.4 10.0 A 22 22 0 0 1 40.6 10.0 L 35.5 17.0 A 14 14 0 0 0 20.5 17.0 Z"/>
    <!-- Right segment (≈ -35° to 35°) -->
    <path d="M 46.0 15.4 A 22 22 0 0 1 46.0 40.6 L 39.0 35.5 A 14 14 0 0 0 39.0 20.5 Z"/>
    <!-- Bottom segment (≈ 55° to 125°) -->
    <path d="M 40.6 46.0 A 22 22 0 0 1 15.4 46.0 L 20.5 39.0 A 14 14 0 0 0 35.5 39.0 Z"/>
    <!-- Left segment (≈ 145° to 215°) -->
    <path d="M 10.0 40.6 A 22 22 0 0 1 10.0 15.4 L 17.0 20.5 A 14 14 0 0 0 17.0 35.5 Z"/>
  </g>

  <!-- Green accent: a small filled wedge in the lower-right interior -->
  <path d="M 28 28 L 38 28 A 10 10 0 0 1 28 38 Z" fill="#65D100"/>

  <!-- Floating accent dot, upper right -->
  <circle cx="52" cy="9" r="4.2" fill="#15191C"/>

  <!-- OPENAPI text -->
  <text x="68" y="31" font-family="Onest, sans-serif" font-weight="800" font-size="22" fill="#15191C" letter-spacing="-0.01em">OPENAPI</text>
  <!-- INITIATIVE text -->
  <text x="68" y="46" font-family="Onest, sans-serif" font-weight="500" font-size="10" fill="#15191C" letter-spacing="0.34em">INITIATIVE</text>
</svg>
